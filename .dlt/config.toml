# .dlt/config.toml
# Non-sensitive configuration — secrets go in secrets.toml (gitignored).

[runtime]
log_level = "INFO"

# ---------------------------------------------------------------------------
# Destination : local filesystem → Parquet
# Files are written to data/staging/{table_name}/{file_id}.parquet
# PySpark reads these directories directly in Phase 2.
# ---------------------------------------------------------------------------
[destination.filesystem]
bucket_url = "data"
layout     = "{table_name}/{file_id}.parquet"

# ---------------------------------------------------------------------------
# Data writer limits — split large tables into multiple files
# ---------------------------------------------------------------------------
[normalize.data_writer]
file_max_items = 500000
file_max_bytes = 52428800   # 50 MB
