# .dlt/config.toml
# Valeurs non-sensibles — les secrets vont dans secrets.toml (gitignored)

[runtime]
log_level = "INFO"

[pipeline]
pipeline_name = "recipes_pipeline"
dataset_name  = "recipes"

# --- Destinations ---
# Commuter entre "duckdb" (dev local) et "filesystem" (delta, prod)
# via la variable d'env DESTINATION ou directement ici.
[destination.duckdb]
database = "data/outputs/recipes_catalog.duckdb"

[destination.filesystem]
bucket_url  = "data/outputs/delta"  # chemin local ou s3://...
layout      = "{table_name}"

[destination.filesystem.deltalake]
# Active le format Delta sur la destination filesystem
target_file_size = 104857600  # 100 MB par fichier

# --- Sources ---
[sources.mit_recipes]
data_dir = "data/raw"

[sources.kaggle_recipes]
data_dir = "data/raw"
