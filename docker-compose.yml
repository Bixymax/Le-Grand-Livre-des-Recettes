services:
  spark-master:
    container_name: spark-master
    build: .
    image: spark-image
    entrypoint: ['./entrypoint.sh', 'master']
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - ./data:/opt/spark/data               # raw + staging + outputs
      - ./src:/opt/spark/src                 # package Python du pipeline
      - ./tests:/opt/spark/tests
      - ./run_pipeline.py:/opt/spark/run_pipeline.py
      - ./.dlt:/opt/spark/.dlt               # config dlt (destination, pipeline name)
      - ./spark-logs:/opt/spark/spark-events
      - ./warehouse:/opt/spark/warehouse
    env_file:
      - .env.spark
    ports:
      - '8080:8080'    # Spark Master Web UI
      - '7077:7077'    # Spark intra-cluster
      - '4040:4040'    # Spark Application UI
      - '8889:8889'    # Jupyter (optionnel)

  spark-history-server:
    container_name: spark-history
    image: spark-image
    entrypoint: ['./entrypoint.sh', 'history']
    depends_on:
      - spark-master
    env_file:
      - .env.spark
    volumes:
      - ./spark-logs:/opt/spark/spark-events
      - ./warehouse:/opt/spark/warehouse
    ports:
      - '18080:18080'

  spark-worker:
    container_name: spark-worker
    image: spark-image
    entrypoint: ['./entrypoint.sh', 'worker']
    depends_on:
      - spark-master
    env_file:
      - .env.spark
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./spark-logs:/opt/spark/spark-events
      - ./warehouse:/opt/spark/warehouse

volumes:
  spark-logs:
